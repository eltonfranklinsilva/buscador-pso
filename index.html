<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador de Imagens EAN</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 16px; }
  .card { background: white; border-radius: 16px; padding: 36px; width: 100%; max-width: 600px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
  h1 { font-size: 22px; font-weight: 600; color: #1a1a1a; margin-bottom: 6px; }
  p.sub { font-size: 14px; color: #666; margin-bottom: 28px; line-height: 1.5; }
  label { font-size: 13px; font-weight: 500; color: #444; display: block; margin-bottom: 6px; }
  .row { display: flex; gap: 10px; }
  input[type=text] { flex: 1; padding: 12px 14px; font-size: 16px; border: 1.5px solid #ddd; border-radius: 10px; outline: none; transition: border-color .2s; }
  input[type=text]:focus { border-color: #1a73e8; }
  input[type=number] { width: 80px; padding: 8px 10px; font-size: 14px; border: 1.5px solid #ddd; border-radius: 8px; outline: none; text-align: center; }
  input[type=number]:focus { border-color: #1a73e8; }
  button.buscar { padding: 12px 22px; background: #1a73e8; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; transition: background .2s; white-space: nowrap; }
  button.buscar:hover { background: #1558b0; }
  button.buscar:disabled { background: #aaa; cursor: not-allowed; }
  #status { margin-top: 18px; font-size: 14px; color: #555; min-height: 20px; }
  #status.erro { color: #c0392b; }
  #status.ok { color: #27ae60; }
  .resize-box { display: none; margin-top: 20px; padding: 16px; background: #f8f9fa; border-radius: 10px; border: 1px solid #eee; }
  .resize-box p { font-size: 13px; font-weight: 500; color: #444; margin-bottom: 10px; }
  .resize-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .resize-row span { font-size: 13px; color: #666; }
  .check-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  .check-row input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; }
  .check-row label { font-size: 13px; color: #555; font-weight: 400; cursor: pointer; }
  .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-top: 18px; }
  .img-card { background: #f5f5f5; border-radius: 10px; border: 1px solid #eee; overflow: hidden; display: flex; flex-direction: column; }
  .img-wrap { aspect-ratio: 1; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
  .img-wrap:hover .overlay { opacity: 1; }
  .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .2s; }
  .overlay span { color: white; font-size: 28px; }
  .img-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .img-wrap .loader { font-size: 11px; color: #aaa; }
  .img-actions { padding: 8px; display: flex; justify-content: center; }
  .btn-dl-individual { width: 100%; padding: 7px; background: #e8f0fe; color: #1a73e8; border: none; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; transition: background .2s; }
  .btn-dl-individual:hover { background: #d2e3fc; }
  .btn-baixar { display: none; width: 100%; margin-top: 16px; background: #188038; color: white; padding: 14px; font-size: 16px; border-radius: 10px; border: none; cursor: pointer; font-weight: 500; transition: background .2s; }
  .btn-baixar:hover { background: #136428; }
  .btn-baixar:disabled { background: #aaa; cursor: not-allowed; }
  .progress { margin-top: 10px; font-size: 13px; color: #666; min-height: 18px; }

  /* Lightbox */
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; align-items: center; justify-content: center; }
  .lightbox.ativo { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 85vh; object-fit: contain; border-radius: 8px; }
  .lb-fechar { position: fixed; top: 20px; right: 28px; color: white; font-size: 36px; cursor: pointer; line-height: 1; background: none; border: none; }
  .lb-nav { position: fixed; top: 50%; transform: translateY(-50%); color: white; font-size: 42px; cursor: pointer; background: none; border: none; padding: 10px; }
  .lb-prev { left: 16px; }
  .lb-next { right: 16px; }
  .lb-info { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: #ccc; font-size: 13px; }
</style>
</head>
<body>
<div class="card">
  <h1>Buscador de Imagens EAN</h1>
  <p class="sub">Digite o codigo EAN do produto para visualizar e baixar as imagens cadastradas.</p>
  <label for="ean-input">Codigo EAN</label>
  <div class="row">
    <input id="ean-input" type="text" placeholder="Ex: 7891234567890" maxlength="14" onkeydown="if(event.key==='Enter') buscar()" />
    <button class="buscar" id="btn-buscar" onclick="buscar()">Buscar</button>
  </div>
  <div id="status"></div>

  <div class="resize-box" id="resize-box">
    <p>Redimensionar imagens antes de baixar (opcional)</p>
    <div class="resize-row">
      <span>Largura:</span>
      <input type="number" id="resize-w" placeholder="ex: 800" min="10" max="5000" />
      <span>px</span>
      <span style="margin-left:8px">Altura:</span>
      <input type="number" id="resize-h" placeholder="ex: 800" min="10" max="5000" />
      <span>px</span>
    </div>
    <div class="check-row">
      <input type="checkbox" id="manter-proporcao" checked />
      <label for="manter-proporcao">Manter proporcao original (preencha so largura ou so altura)</label>
    </div>
  </div>

  <div id="preview" class="preview-grid"></div>
  <button class="btn-baixar" id="btn-baixar" onclick="baixarZip()">Baixar todas como ZIP</button>
  <div class="progress" id="progress"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-fechar" onclick="fecharLightbox()">x</button>
  <button class="lb-nav lb-prev" onclick="navegarLightbox(-1)">&#8249;</button>
  <img id="lb-img" src="" alt="" />
  <button class="lb-nav lb-next" onclick="navegarLightbox(1)">&#8250;</button>
  <div class="lb-info" id="lb-info"></div>
</div>

<script>
var SUPABASE_URL = 'https://tzvgyooarnefpnsahxqr.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6dmd5b29hcm5lZnBuc2FoeHFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MjE1NDAsImV4cCI6MjA4OTA5NzU0MH0.YL8zBVRG0CfiXJkkhA0cZi820nPnEk_TWbzRi6assfA';
var BUCKET = 'produtos-ean';
var arquivos = [];
var lbIndex = 0;

function setStatus(msg, tipo) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = tipo;
}

function buscar() {
  var ean = document.getElementById('ean-input').value.trim();
  if (!ean) { setStatus('Digite um codigo EAN.', 'erro'); return; }

  document.getElementById('btn-buscar').disabled = true;
  document.getElementById('btn-baixar').style.display = 'none';
  document.getElementById('resize-box').style.display = 'none';
  document.getElementById('preview').innerHTML = '';
  document.getElementById('progress').textContent = '';
  arquivos = [];
  setStatus('Buscando imagens para o EAN ' + ean + '...', '');

  fetch(SUPABASE_URL + '/storage/v1/object/list/' + BUCKET, {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ limit: 100, offset: 0, prefix: ean + '/' })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (!Array.isArray(data)) {
      setStatus('Erro: ' + (data.message || JSON.stringify(data)), 'erro');
      return;
    }

    var imagens = data.filter(function(f) {
      return f.name && f.name.match(/\.(jpg|jpeg|png|webp|gif)$/i);
    }).sort(function(a, b) {
      return a.name.localeCompare(b.name);
    });

    if (!imagens.length) {
      setStatus('Nenhuma imagem encontrada para o EAN ' + ean, 'erro');
      return;
    }

    arquivos = imagens.map(function(f) {
      return {
        nome: f.name,
        url: SUPABASE_URL + '/storage/v1/object/public/' + BUCKET + '/' + ean + '/' + encodeURIComponent(f.name)
      };
    });

    setStatus(arquivos.length + ' imagem(ns) encontrada(s)', 'ok');

    var grid = document.getElementById('preview');
    arquivos.forEach(function(f, idx) {
      var card = document.createElement('div');
      card.className = 'img-card';

      var wrap = document.createElement('div');
      wrap.className = 'img-wrap';
      wrap.onclick = function() { abrirLightbox(idx); };

      var img = document.createElement('img');
      img.src = f.url;
      img.alt = f.nome;
      img.onerror = function() { wrap.innerHTML = '<span class="loader">erro</span>'; };

      var overlay = document.createElement('div');
      overlay.className = 'overlay';
      overlay.innerHTML = '<span>&#128269;</span>';

      wrap.appendChild(img);
      wrap.appendChild(overlay);

      var actions = document.createElement('div');
      actions.className = 'img-actions';

      var btnDl = document.createElement('button');
      btnDl.className = 'btn-dl-individual';
      btnDl.textContent = 'Baixar esta imagem';
      btnDl.onclick = function() { baixarIndividual(f, idx); };

      actions.appendChild(btnDl);
      card.appendChild(wrap);
      card.appendChild(actions);
      grid.appendChild(card);
    });

    document.getElementById('btn-baixar').style.display = 'block';
    document.getElementById('resize-box').style.display = 'block';
  })
  .catch(function(e) {
    setStatus('Erro: ' + e.message, 'erro');
  })
  .finally(function() {
    document.getElementById('btn-buscar').disabled = false;
  });
}

function getResize() {
  var w = parseInt(document.getElementById('resize-w').value) || 0;
  var h = parseInt(document.getElementById('resize-h').value) || 0;
  var manter = document.getElementById('manter-proporcao').checked;
  return { w: w, h: h, manter: manter };
}

function redimensionarBlob(blob, w, h, manter) {
  return new Promise(function(resolve) {
    if (!w && !h) { resolve(blob); return; }
    var url = URL.createObjectURL(blob);
    var img = new Image();
    img.onload = function() {
      var sw = img.naturalWidth;
      var sh = img.naturalHeight;
      var tw = w, th = h;
      if (manter) {
        if (w && !h) { th = Math.round(sh * w / sw); tw = w; }
        else if (h && !w) { tw = Math.round(sw * h / sh); th = h; }
        else if (w && h) { var r = Math.min(w/sw, h/sh); tw = Math.round(sw*r); th = Math.round(sh*r); }
      }
      var canvas = document.createElement('canvas');
      canvas.width = tw; canvas.height = th;
      canvas.getContext('2d').drawImage(img, 0, 0, tw, th);
      URL.revokeObjectURL(url);
      canvas.toBlob(function(b) { resolve(b); }, blob.type || 'image/jpeg', 0.92);
    };
    img.src = url;
  });
}

function baixarIndividual(f, idx) {
  var resize = getResize();
  fetch(f.url)
    .then(function(r) { return r.blob(); })
    .then(function(blob) { return redimensionarBlob(blob, resize.w, resize.h, resize.manter); })
    .then(function(blob) {
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = f.nome;
      a.click();
    })
    .catch(function(e) { alert('Erro ao baixar: ' + e.message); });
}

function baixarZip() {
  if (!arquivos.length) return;
  var ean = document.getElementById('ean-input').value.trim();
  var btn = document.getElementById('btn-baixar');
  var prog = document.getElementById('progress');
  var resize = getResize();
  btn.disabled = true;
  btn.textContent = 'Preparando ZIP...';

  var zip = new JSZip();
  var pasta = zip.folder(ean);
  var i = 0;

  function baixarProximo() {
    if (i >= arquivos.length) {
      prog.textContent = 'Gerando arquivo ZIP...';
      zip.generateAsync({ type: 'blob' }).then(function(content) {
        var a = document.createElement('a');
        a.href = URL.createObjectURL(content);
        a.download = ean + '_imagens.zip';
        a.click();
        btn.textContent = 'Download concluido!';
        prog.textContent = '';
        btn.disabled = false;
      });
      return;
    }

    var f = arquivos[i];
    prog.textContent = 'Baixando imagem ' + (i + 1) + ' de ' + arquivos.length + '...';

    fetch(f.url)
      .then(function(r) { return r.blob(); })
      .then(function(blob) { return redimensionarBlob(blob, resize.w, resize.h, resize.manter); })
      .then(function(blob) {
        pasta.file(f.nome, blob);
        i++;
        baixarProximo();
      })
      .catch(function(e) {
        alert('Erro no download: ' + e.message);
        btn.textContent = 'Baixar todas como ZIP';
        btn.disabled = false;
      });
  }

  baixarProximo();
}

function abrirLightbox(idx) {
  lbIndex = idx;
  atualizarLightbox();
  document.getElementById('lightbox').classList.add('ativo');
  document.onkeydown = function(e) {
    if (e.key === 'ArrowRight') navegarLightbox(1);
    if (e.key === 'ArrowLeft') navegarLightbox(-1);
    if (e.key === 'Escape') fecharLightbox();
  };
}

function atualizarLightbox() {
  var f = arquivos[lbIndex];
  document.getElementById('lb-img').src = f.url;
  document.getElementById('lb-info').textContent = f.nome + ' (' + (lbIndex + 1) + ' de ' + arquivos.length + ')';
}

function navegarLightbox(dir) {
  lbIndex = (lbIndex + dir + arquivos.length) % arquivos.length;
  atualizarLightbox();
}

function fecharLightbox() {
  document.getElementById('lightbox').classList.remove('ativo');
  document.onkeydown = null;
}
</script>
</body>
</html>
