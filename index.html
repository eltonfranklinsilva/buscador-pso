<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador de Imagens por EAN</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 16px; }
  .card { background: white; border-radius: 16px; padding: 36px; width: 100%; max-width: 560px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
  h1 { font-size: 22px; font-weight: 600; color: #1a1a1a; margin-bottom: 6px; }
  p.sub { font-size: 14px; color: #666; margin-bottom: 28px; line-height: 1.5; }
  label { font-size: 13px; font-weight: 500; color: #444; display: block; margin-bottom: 6px; }
  .row { display: flex; gap: 10px; }
  input { flex: 1; padding: 12px 14px; font-size: 16px; border: 1.5px solid #ddd; border-radius: 10px; outline: none; transition: border-color .2s; }
  input:focus { border-color: #1a73e8; }
  button.buscar { padding: 12px 22px; background: #1a73e8; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; transition: background .2s; white-space: nowrap; }
  button.buscar:hover { background: #1558b0; }
  button.buscar:disabled { background: #aaa; cursor: not-allowed; }
  #status { margin-top: 18px; font-size: 14px; color: #555; min-height: 20px; }
  #status.erro { color: #c0392b; }
  #status.ok { color: #27ae60; }
  .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-top: 18px; }
  .img-wrap { position: relative; aspect-ratio: 1; background: #f5f5f5; border-radius: 8px; border: 1px solid #eee; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .img-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .img-wrap .loader { font-size: 11px; color: #aaa; }
  .btn-baixar { display: none; width: 100%; margin-top: 16px; background: #188038; color: white; padding: 14px; font-size: 16px; border-radius: 10px; border: none; cursor: pointer; font-weight: 500; transition: background .2s; }
  .btn-baixar:hover { background: #136428; }
  .btn-baixar:disabled { background: #aaa; cursor: not-allowed; }
  .progress { margin-top: 10px; font-size: 13px; color: #666; min-height: 18px; }
</style>
</head>
<body>
<div class="card">
  <h1>🔍 Buscador de Imagens EAN</h1>
  <p class="sub">Digite o código EAN do produto para visualizar e baixar todas as imagens cadastradas.</p>

  <label for="ean-input">Código EAN</label>
  <div class="row">
    <input id="ean-input" type="text" placeholder="Ex: 7891234567890" maxlength="14"
      onkeydown="if(event.key==='Enter') buscar()" />
    <button class="buscar" id="btn-buscar" onclick="buscar()">Buscar</button>
  </div>

  <div id="status"></div>
  <div id="preview" class="preview-grid"></div>
  <button class="btn-baixar" id="btn-baixar" onclick="baixarZip()">⬇ Baixar todas como ZIP</button>
  <div class="progress" id="progress"></div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbye3Wl03FXVOVc8UJxI0CUPdk1zcYocNddzgsRqQDrNy4Vk7vck-o7PxpWOf5wGI5tv/exec';
let arquivos = [];

async function buscar() {
  const ean = document.getElementById('ean-input').value.trim();
  if (!ean) { setStatus('Digite um código EAN.', 'erro'); return; }

  document.getElementById('btn-buscar').disabled = true;
  document.getElementById('btn-baixar').style.display = 'none';
  document.getElementById('preview').innerHTML = '';
  document.getElementById('progress').textContent = '';
  arquivos = [];
  setStatus('🔎 Buscando imagens para o EAN ' + ean + '...', '');

  try {
    const resp = await fetch(API_URL + '?ean=' + encodeURIComponent(ean));
    const data = await resp.json();

    if (data.erro) { setStatus('❌ ' + data.erro, 'erro'); return; }
    if (!data.imagens || !data.imagens.length) { setStatus('Nenhuma imagem encontrada.', 'erro'); return; }

    arquivos = data.imagens;
    setStatus('✓ ' + arquivos.length + ' imagem(ns) encontrada(s) — carregando previews...', 'ok');

    const grid = document.getElementById('preview');

    arquivos.forEach((f, i) => {
      const wrap = document.createElement('div');
      wrap.className = 'img-wrap';
      wrap.innerHTML = '<span class="loader">carregando...</span>';
      grid.appendChild(wrap);

      fetch(API_URL + '?id=' + f.id)
        .then(r => r.json())
        .then(d => {
          if (d.base64) {
            const img = document.createElement('img');
            img.src = 'data:' + d.mimeType + ';base64,' + d.base64;
            img.alt = f.nome;
            img.title = f.nome;
            wrap.innerHTML = '';
            wrap.appendChild(img);
          }
        })
        .catch(() => { wrap.innerHTML = '<span class="loader">erro</span>'; });
    });

    document.getElementById('btn-baixar').style.display = 'block';
    setStatus('✓ ' + arquivos.length + ' imagem(ns) encontrada(s)', 'ok');

  } catch(e) {
    setStatus('❌ Erro de conexão: ' + e.message, 'erro');
  } finally {
    document.getElementById('btn-buscar').disabled = false;
  }
}

async function baixarZip() {
  if (!arquivos.length) return;
  const ean = document.getElementById('ean-input').value.trim();
  const btn = document.getElementById('btn-baixar');
  const prog = document.getElementById('progress');
  btn.disabled = true;
  btn.textContent = '⏳ Preparando ZIP...';

  try {
    const zip = new JSZip();
    const pasta = zip.folder(ean);

    for (let i = 0; i < arquivos.length; i++) {
      const f = arquivos[i];
      prog.textContent = 'Baixando imagem ' + (i + 1) + ' de ' + arquivos.length + '...';
      const resp = await fetch(API_URL + '?id=' + f.id);
      const d = await resp.json();
      if (d.base64) {
        const byteChars = atob(d.base64);
        const byteArr = new Uint8Array(byteChars.length);
        for (let j = 0; j < byteChars.length; j++) byteArr[j] = byteChars.charCodeAt(j);
        pasta.file(f.nome, byteArr);
      }
    }

    prog.textContent = 'Gerando arquivo ZIP...';
    const content = await zip.generateAsync({ type: 'blob' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(content);
    a.download = ean + '_imagens.zip';
    a.click();

    btn.textContent = '✓ Download concluído!';
    prog.textContent = '';
  } catch(e) {
    alert('Erro no download: ' + e.message);
    btn.textContent = '⬇ Baixar todas como ZIP';
  } finally {
    btn.disabled = false;
  }
}

function setStatus(msg, tipo) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = tipo;
}
</script>
</body>
</html>
